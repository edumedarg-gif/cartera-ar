  const [ops, setOps] = useState(null);
  const [settings, setSettings] = useState(null);
  const [history, setHistory] = useState([]);
  const [macro, setMacro] = useState({ dolares: null, riesgo: null, updated: null });
  const [loadingMacro, setLoadingMacro] = useState(false);
  const [macroDetail, setMacroDetail] = useState(null);
  const [hide, setHide] = useState(false);
  const loaded = useRef(false);

  useEffect(() => {
    (async () => {
      const _hV = await storeGet("inv7_holdingsV", 0);
      let hs;
      if (_hV < 2) { hs = SEED_HOLDINGS; storeSet("inv7_holdings", SEED_HOLDINGS); storeSet("inv7_holdingsV", 2); }
      else hs = await storeGet("inv7_holdings", SEED_HOLDINGS);
      setHoldings(hs.map(h => (h.isCash || h.ticker === "USD-BAL" || h.ticker === "USD-ALL") ? { ...h, cls: "EFECTIVO" } : h));
      setAportes(await storeGet("inv6_aportes", SEED_APORTES));
      const _opsV = await storeGet("inv7_opsV", 0);
      if (_opsV < 5) { setOps(SEED_OPS); storeSet("inv7_ops", SEED_OPS); storeSet("inv7_opsV", 5); }
      else setOps(await storeGet("inv7_ops", SEED_OPS));
      setSettings(await storeGet("inv6_settings", { refDolar: "bolsa", baseCur: "USD", returns: { MERVAL: 18, CEDEAR: 12, BONO_CORP: 9, BONO_NAC: 11, FCI: 8, ACCION_INT: 10, ETF: 9, CRYPTO: 25 }, monthlyAporteUSD: 2000 }));
      setHistory(await storeGet("inv6_history", []));
      loaded.current = true;
    })();
  }, []);
  useEffect(() => { if (loaded.current && holdings) storeSet("inv7_holdings", holdings); }, [holdings]);
  useEffect(() => { if (loaded.current && aportes) storeSet("inv6_aportes", aportes); }, [aportes]);
  useEffect(() => { if (loaded.current && ops) storeSet("inv7_ops", ops); }, [ops]);
  useEffect(() => { if (loaded.current && settings) storeSet("inv6_settings", settings); }, [settings]);
  useEffect(() => { if (loaded.current) storeSet("inv6_history", history); }, [history]);

  const refreshMacro = useCallback(async () => {
    setLoadingMacro(true);
    try {
      const [dRes, rRes] = await Promise.allSettled([
        fetch("https://dolarapi.com/v1/dolares").then(r => r.json()),
        fetch("https://api.argentinadatos.com/v1/finanzas/indices/riesgo-pais/ultimo").then(r => r.json()),
      ]);
      let dolares = null, riesgo = null;
      if (dRes.status === "fulfilled" && Array.isArray(dRes.value)) { dolares = {}; dRes.value.forEach(d => { dolares[d.casa] = d; }); }
      if (rRes.status === "fulfilled" && rRes.value?.valor) riesgo = rRes.value;
      setMacro(m => ({ dolares: dolares || m.dolares, riesgo: riesgo || m.riesgo, updated: new Date() }));

      // precios de acciones/bonos/CEDEARs en vivo (vía proxy /api/prices, solo funciona desplegado)
      try {
        const pr = await fetch("/api/prices").then(r => r.ok ? r.json() : null);
        if (pr && typeof pr === "object" && Object.keys(pr).length) {
          // MEP fresco para convertir ARS->USD en activos cotizados en dólares (Allaria)
          const mep = (() => { const dd = dolares || macro.dolares; const c = dd && dd.bolsa; return (c && (c.venta || c.compra)) || 0; })();
          // auto-calibra la escala: data912 manda bonos ×100, etc. Elige la escala
          // que más se acerca al precio ya cargado, y solo acepta si el movimiento es < 4x.
          const fitScale = (cur, raw) => {
            raw = +raw; cur = +cur;
            if (!raw || raw <= 0 || !cur || cur <= 0) return null;
            const cands = [raw, raw / 100, raw * 100, raw / 10, raw * 10, raw / 1000];
            let best = null, br = Infinity;
            for (const c of cands) { const r = Math.abs(Math.log(c / cur)); if (r < br) { br = r; best = c; } }
            return (best && best / cur <= 4 && best / cur >= 0.25) ? best : null;
          };
          setHoldings(hs => hs.map(h => {
            if (h.cls === "EFECTIVO" || h.cls === "FCI" || h.cls === "CRYPTO") return h;
            const key = (h.ticker || "").toUpperCase().replace(/-A$/, "");
            const rawARS = +pr[key];
            if (!rawARS || rawARS <= 0) return h;
            // el precio de mercado viene en ARS; si la tenencia está en USD, lo paso a USD.
            // uso el MEP en vivo si está; si no, el tipo de cambio implícito en el costo de la tenencia.
            let toNative = 1;
            if (h.currency === "USD") {
              toNative = mep || ((+h.investedARS && +h.investedUSD) ? (+h.investedARS / +h.investedUSD) : 1452);
            }
            const rawNative = rawARS / toNative;
            const fitted = fitScale(h.manualPrice, rawNative);
            return fitted ? { ...h, manualPrice: fitted, liveAt: new Date().toISOString() } : h;
          }));
        }
      } catch { /* sin proxy (modo local): se mantienen los precios manuales */ }

      if (holdings) {
        const ids = [...new Set(holdings.filter(h => h.cls === "CRYPTO").map(h => h.coingeckoId || CRYPTO_IDS[h.ticker?.toUpperCase()]).filter(Boolean))];
        if (ids.length) {
          try {
            const cg = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids.join(",")}&vs_currencies=usd`).then(r => r.json());
            setHoldings(hs => hs.map(h => {
              if (h.cls !== "CRYPTO") return h;
              const id = h.coingeckoId || CRYPTO_IDS[h.ticker?.toUpperCase()];
              return cg[id]?.usd ? { ...h, manualPrice: cg[id].usd, liveAt: new Date().toISOString() } : h;
            }));
          } catch { /* */ }
        }
      }
    } finally { setLoadingMacro(false); }
  }, [holdings]);
  useEffect(() => { if (loaded.current) refreshMacro(); /* eslint-disable-next-line */ }, [loaded.current]);

  const refRate = useMemo(() => { const d = macro.dolares?.[settings?.refDolar || "bolsa"]; return d ? (d.venta || d.compra) : null; }, [macro, settings]);
  const base = settings?.baseCur || "USD";
  const money = useCallback((usd, ars) => base === "ARS" ? fmtARS(ars) : fmtUSD(usd), [base]);

  const calc = useCallback((h) => {
    const qty = +h.qty || 0, price = +h.manualPrice || 0;
    const valNative = price * qty;
    const r = refRate || 1;
    const costUSD = +h.investedUSD || 0, costARS = +h.investedARS || 0;
    let valUSD, valARS;
    if (h.currency === "USD") { valUSD = valNative; valARS = valNative * r; }
    else { valARS = valNative; valUSD = valNative / r; }
    return { qty, price, valUSD, valARS, costUSD, costARS,
      avgNative: h.currency === "USD" ? (qty ? costUSD / qty : 0) : (qty ? costARS / qty : 0),
      pnlUSD: valUSD - costUSD, pnlARS: valARS - costARS,
      pnlPctUSD: costUSD ? (valUSD / costUSD - 1) * 100 : 0,
      pnlPctARS: costARS ? (valARS / costARS - 1) * 100 : 0 };
  }, [refRate]);

  const rows = useMemo(() => (holdings || []).map(h => ({ ...h, m: calc(h) })), [holdings, calc]);
  const totals = useMemo(() => rows.reduce((t, r) => ({
    valUSD: t.valUSD + r.m.valUSD, valARS: t.valARS + r.m.valARS, costUSD: t.costUSD + r.m.costUSD, costARS: t.costARS + r.m.costARS,
  }), { valUSD: 0, valARS: 0, costUSD: 0, costARS: 0 }), [rows]);
  const pnlUSD = totals.valUSD - totals.costUSD;
  const pnlPct = totals.costUSD ? (pnlUSD / totals.costUSD) * 100 : 0;
  const aportesUSD = useMemo(() => (aportes || []).reduce((s, a) => s + (a.currency === "USD" ? +a.amount : (+a.amount) / (refRate || 1)), 0), [aportes, refRate]);

  /* ---- earning rate (per day/week/month/year) — EXCLUYE CRIPTO (depende del ciclo) ---- */
  const rate = useMemo(() => {
    const nc = rows.filter(r => r.cls !== "CRYPTO");
    const cost = nc.reduce((s, r) => s + r.m.costUSD, 0);
    const valv = nc.reduce((s, r) => s + r.m.valUSD, 0);
    const pnl = valv - cost;
    if (!nc.length || !cost) return null;
    const firstMs = Math.min(...nc.map(r => new Date(r.firstDate || "2024-01-01").getTime()));
    const days = Math.max(1, (Date.now() - firstMs) / 86400000);
    const wFirst = nc.reduce((s, r) => s + r.m.costUSD * new Date(r.firstDate || "2024-01-01").getTime(), 0) / cost;
    const T = Math.max(0.2, (Date.now() - wFirst) / (86400000 * 365.25));
    const ann = Math.pow(1 + pnl / cost, 1 / T) - 1;
    const perDay = pnl / days;
    const runDay = valv * (Math.pow(1 + ann, 1 / 365.25) - 1);
    return { days, T, ann: ann * 100, firstMs, pnl, val: valv,
      avg: { d: perDay, w: perDay * 7, m: perDay * 30.44, y: perDay * 365.25 },
      run: { d: runDay, w: runDay * 7, m: runDay * 30.44, y: runDay * 365.25 } };
  }, [rows]);

  /* ---- rendimiento anualizado real por clase (sin cripto) para proyecciones ---- */
  const classStats = useMemo(() => {
    const m = {};
    rows.filter(r => r.cls !== "CRYPTO").forEach(r => {
      const g = m[r.cls] = m[r.cls] || { value: 0, cost: 0, wDate: 0 };
      g.value += r.m.valUSD; g.cost += r.m.costUSD; g.wDate += r.m.costUSD * new Date(r.firstDate || "2024-01-01").getTime();
    });
    Object.values(m).forEach(g => {
      const T = Math.max(0.2, (Date.now() - g.wDate / (g.cost || 1)) / (86400000 * 365.25));
      g.ann = g.cost ? (Math.pow(g.value / g.cost, 1 / T) - 1) * 100 : 0;
    });
    return m;
  }, [rows]);

  const snapshot = useCallback(() => {
    if (!totals.valUSD) return;
    setHistory(h => { const d = today(); return [...h.filter(x => x.date !== d), { date: d, valUSD: totals.valUSD, valARS: totals.valARS, aportesUSD }].sort((a, b) => a.date.localeCompare(b.date)); });
  }, [totals, aportesUSD]);

  if (!holdings) return <div className="app" style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh" }}><Loader2 className="spin" /></div>;

  return (
    <div className={"app" + (hide ? " hide-money" : "")}>
      <style>{CSS}</style>
      <Header macro={macro} settings={settings} setSettings={setSettings} refRate={refRate} loading={loadingMacro}
        onRefresh={() => { refreshMacro(); setTimeout(snapshot, 1500); }} onMacro={setMacroDetail} hide={hide} setHide={setHide} />
      {macroDetail && <MacroModal item={macroDetail} onClose={() => setMacroDetail(null)} />}
      <div className="wrap" style={{ paddingTop: 22, paddingBottom: 60 }}>
        <Hero totals={totals} pnlUSD={pnlUSD} pnlPct={pnlPct} aportesUSD={aportesUSD} count={rows.length} rate={rate} base={base} money={money} refRate={refRate} />

        <div className="tabbar" style={{ margin: "24px 0 18px", borderBottom: "1px solid var(--line)" }}>
          {[["cartera", "Cartera", Wallet], ["ritmo", "Ritmo de ganancia", Gauge], ["evolucion", "Evolución", LineIcon],
            ["aportes", "Aportes", PiggyBank], ["proyeccion", "Proyecciones", TrendingUp], ["historico", "Histórico", History], ["ia", "Inteligencia", Brain]].map(([k, l, Ic]) => (
            <button key={k} className={"tab" + (tab === k ? " on" : "")} onClick={() => setTab(k)}><Ic size={13} style={{ marginRight: 5, verticalAlign: -2 }} />{l}</button>
          ))}
        </div>

        {tab === "cartera" && <Cartera rows={rows} setHoldings={setHoldings} base={base} money={money} refRate={refRate} />}
        {tab === "ritmo" && <Ritmo rate={rate} totals={totals} pnlUSD={pnlUSD} refRate={refRate} />}
        {tab === "evolucion" && <Evolucion rows={rows} history={history} totals={totals} base={base} money={money} refRate={refRate} aportes={aportes} />}
        {tab === "aportes" && <Aportes aportes={aportes} setAportes={setAportes} aportesUSD={aportesUSD} valUSD={totals.valUSD} setHoldings={setHoldings} refRate={refRate} ops={ops} setOps={setOps} />}
        {tab === "proyeccion" && <Proyeccion rows={rows} settings={settings} setSettings={setSettings} classStats={classStats} />}
        {tab === "historico" && <Historico />}
        {tab === "ia" && <IA rows={rows} totals={totals} macro={macro} pnlPct={pnlPct} />}
        <Disclaimer />
      </div>
    </div>
  );
}

/* ============================== header ============================== */
function Header({ macro, settings, setSettings, refRate, loading, onRefresh, onMacro, hide, setHide }) {
  const d = macro.dolares;
  const cell = (label, val, sub, key) => (
    <div className="macro-cell" onClick={key ? () => onMacro({ key, label }) : undefined}
      style={key ? { cursor: "pointer" } : undefined} title={key ? "Ver histórico" : undefined}>
      <div className="eyebrow">{label}</div>
      <div className="mono" style={{ fontSize: 17, fontWeight: 600, marginTop: 3 }}>{val}</div>
      {sub && <div className="muted" style={{ fontSize: 10, marginTop: 1 }}>{sub}</div>}</div>
  );
  return (
    <div style={{ borderBottom: "1px solid var(--line)", background: "linear-gradient(180deg,#0F171E,#0D1318)" }}>
      <div className="wrap" style={{ paddingTop: 18, paddingBottom: 16 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12, marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 11 }}>
            <div style={{ width: 34, height: 34, borderRadius: 9, background: "linear-gradient(135deg,#74ACDF,#CBA45E)", display: "flex", alignItems: "center", justifyContent: "center" }}><Activity size={18} color="#0D1318" /></div>
            <div><div style={{ fontFamily: "var(--display)", fontWeight: 600, fontSize: 17, lineHeight: 1 }}>Cartera<span className="cel">·</span>AR</div>
              <div className="eyebrow" style={{ marginTop: 3 }}>Cockpit privado de inversión</div></div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <button className="btn" onClick={() => setHide(h => !h)} title={hide ? "Mostrar saldos" : "Ocultar saldos"} style={{ padding: "8px 10px" }}>
              {hide ? <EyeOff size={15} /> : <Eye size={15} />}
            </button>
            <div style={{ display: "flex", border: "1px solid var(--line)", borderRadius: 9, overflow: "hidden" }}>
              {["USD", "ARS"].map(c => (
                <button key={c} onClick={() => setSettings(s => ({ ...s, baseCur: c }))}
                  style={{ padding: "8px 13px", fontFamily: "var(--mono)", fontSize: 12, cursor: "pointer", border: "none",
                    background: (settings.baseCur || "USD") === c ? "var(--celeste)" : "transparent",
                    color: (settings.baseCur || "USD") === c ? "#08151F" : "var(--muted)", fontWeight: 600 }}>
                  {c === "USD" ? "US$" : "AR$"}
                </button>
              ))}
            </div>
            <select className="sel" style={{ width: "auto" }} value={settings.refDolar} onChange={e => setSettings(s => ({ ...s, refDolar: e.target.value }))}>
              <option value="bolsa">Dólar MEP (ref.)</option><option value="contadoconliqui">Dólar CCL</option>
              <option value="cripto">Dólar Cripto</option><option value="blue">Dólar Blue</option><option value="oficial">Dólar Oficial</option>
            </select>
            <button className="btn" onClick={onRefresh} disabled={loading}><RefreshCw size={14} className={loading ? "spin" : ""} />Actualizar</button>
          </div>
        </div>
        <div className="macro-rail">
          {cell("MEP", d?.bolsa ? "$" + fmt(d.bolsa.venta, 0) : "—", null, "bolsa")}
          {cell("CCL", d?.contadoconliqui ? "$" + fmt(d.contadoconliqui.venta, 0) : "—", null, "contadoconliqui")}
          {cell("Blue", d?.blue ? "$" + fmt(d.blue.venta, 0) : "—", null, "blue")}
          {cell("Cripto", d?.cripto ? "$" + fmt(d.cripto.venta, 0) : "—", null, "cripto")}
          {cell("Oficial", d?.oficial ? "$" + fmt(d.oficial.venta, 0) : "—", null, "oficial")}
          {cell("Riesgo País", macro.riesgo ? fmt(macro.riesgo.valor, 0) + " pb" : "—", macro.riesgo?.fecha, "riesgo")}
          <div className="macro-cell" style={{ minWidth: 128 }}><div className="eyebrow">T.C. referencia</div>
            <div className="mono" style={{ fontSize: 17, fontWeight: 600, marginTop: 3 }}>{refRate ? "$" + fmt(refRate, 0) : "—"}</div>
            <div className="muted" style={{ fontSize: 10, marginTop: 1 }}>{macro.updated ? "Act. " + macro.updated.toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit" }) : "sin datos"}</div></div>
        </div>
      </div>
    </div>
  );
}

/* ---- macro history modal ---- */
function MacroModal({ item, onClose }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState("");
  const isRiesgo = item.key === "riesgo";
  useEffect(() => {
    setLoading(true); setErr("");
    const url = isRiesgo
      ? "https://api.argentinadatos.com/v1/finanzas/indices/riesgo-pais"
      : `https://api.argentinadatos.com/v1/cotizaciones/dolares/${item.key}`;
    fetch(url).then(r => r.json()).then(arr => {
      if (!Array.isArray(arr) || !arr.length) throw new Error("no data");
      const cut = "2021-01-01";
      const pts = arr.filter(x => x.fecha >= cut).filter((_, i) => i % 5 === 0)
        .map(x => ({ date: x.fecha, v: isRiesgo ? x.valor : x.venta }));
      setData(pts);
    }).catch(() => setErr("No pude traer el histórico ahora.")).finally(() => setLoading(false));
  }, [item.key]);
  const cur = data && data.length ? data[data.length - 1].v : null;
  const first = data && data.length ? data[0].v : null;
  const chg = (cur != null && first) ? ((cur / first - 1) * 100) : null;
  const color = isRiesgo ? "#E8604C" : "#74ACDF";
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal panel" style={{ padding: 24, maxWidth: 680 }} onClick={e => e.stopPropagation()}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
          <h3 style={{ fontSize: 18, fontWeight: 600 }}>{item.label} <span className="muted" style={{ fontSize: 13, fontWeight: 400 }}>· histórico desde 2021</span></h3>
          <button className="btn-ghost btn" onClick={onClose}><X size={16} /></button>
        </div>
        {cur != null && <div style={{ display: "flex", gap: 28, marginBottom: 16 }}>
          <div><div className="eyebrow">Valor actual</div><div className="kpi-num gold" style={{ fontSize: 24, marginTop: 4 }}>{isRiesgo ? fmt(cur, 0) + " pb" : "$" + fmt(cur, 0)}</div></div>
          {chg != null && <div><div className="eyebrow">Cambio desde 2021</div><div className={"kpi-num " + (chg >= 0 ? (isRiesgo ? "loss" : "gain") : (isRiesgo ? "gain" : "loss"))} style={{ fontSize: 24, marginTop: 4 }}>{fmtPct(chg)}</div></div>}
        </div>}
        {loading ? <div className="empty" style={{ padding: 40 }}><Loader2 size={20} className="spin" /></div> :
          err ? <div style={{ color: "var(--loss)", fontSize: 12.5 }}><AlertTriangle size={12} /> {err}</div> :
          <ResponsiveContainer width="100%" height={260}>
            <AreaChart data={data}>
              <defs><linearGradient id="gm" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity={.4} /><stop offset="100%" stopColor={color} stopOpacity={0} /></linearGradient></defs>
              <CartesianGrid stroke="#2A3946" strokeDasharray="2 4" vertical={false} />
              <XAxis dataKey="date" stroke="#5C6F7E" fontSize={10} interval={Math.ceil((data?.length || 1) / 8)} tickFormatter={v => v.slice(0, 7)} />
              <YAxis stroke="#5C6F7E" fontSize={10} tickFormatter={v => isRiesgo ? fmt(v, 0) : "$" + (v >= 1000 ? (v / 1000).toFixed(1) + "k" : v)} />
              <Tooltip contentStyle={ttStyle} formatter={v => [isRiesgo ? fmt(v, 0) + " pb" : "$" + fmt(v, 0), item.label]} />
              <Area type="monotone" dataKey="v" stroke={color} strokeWidth={2} fill="url(#gm)" />
            </AreaChart>
          </ResponsiveContainer>}
        <p className="muted" style={{ fontSize: 11, marginTop: 10, lineHeight: 1.5 }}>Fuente: argentinadatos.com. {isRiesgo ? "El riesgo país baja = mejor percepción de la deuda argentina." : "Serie diaria del tipo de cambio (precio de venta)."}</p>
      </div>
    </div>
  );
}

/* ============================== hero ============================== */
function Hero({ totals, pnlUSD, pnlPct, aportesUSD, count, rate, base, money, refRate }) {
  const up = pnlUSD >= 0;
  const r = refRate || 1;
  const pnlBase = base === "ARS" ? (up ? "+" : "") + fmtARS((totals.valARS - totals.costARS)) : (up ? "+" : "") + fmtUSD(pnlUSD);
  return (
    <div className="panel" style={{ padding: "26px 28px", background: "linear-gradient(135deg,#16212B,#131C24)", position: "relative", overflow: "hidden" }}>
      <div style={{ position: "absolute", right: -40, top: -40, width: 200, height: 200, borderRadius: "50%", background: "radial-gradient(circle,rgba(116,172,223,.10),transparent 70%)" }} />
      <div style={{ display: "flex", flexWrap: "wrap", gap: 30, alignItems: "flex-end", justifyContent: "space-between" }}>
        <div title="El valor de TODO lo que tenés ahora mismo, sumando los tres lugares (Balanz + Allaria + Nexo). El número grande está en dólares; abajo, el mismo monto convertido a pesos al dólar de referencia." style={{ cursor: "help" }}>
          <div className="eyebrow">Valor total de cartera · {count} posiciones</div>
          <div className="kpi-num gold" style={{ fontSize: 44, marginTop: 8 }}>{base === "ARS" ? fmtARS(totals.valARS) : fmtUSD(totals.valUSD)}</div>
          <div className="mono muted" style={{ fontSize: 15, marginTop: 4 }}>{base === "ARS" ? fmtUSD(totals.valUSD) : fmtARS(totals.valARS)}</div>
        </div>
        <div style={{ display: "flex", gap: 28, flexWrap: "wrap" }}>
          <Kpi label={"Resultado (" + (base === "ARS" ? "ARS" : "USD") + ")"} big={pnlBase} sub={fmtPct(pnlPct) + " s/costo"} tone={up ? "gain" : "loss"} icon={up ? TrendingUp : TrendingDown} tip={"Cuánto ganaste (o perdiste) respecto de lo que te costaron los activos que tenés hoy. Es el valor actual menos el costo. El porcentaje es esa ganancia medida sobre el costo (s/costo = sobre el costo)."} />
          <Kpi label="Capital invertido" big={money(totals.costUSD, totals.costARS)} sub={"Aportes registrados " + (base === "ARS" ? fmtARS(aportesUSD * r) : fmtUSD(aportesUSD)) + " (oper. 2024+)"} tone="cel" icon={PiggyBank} tip={"Lo que te costaron en total los activos que tenés hoy, sumando los tres lugares. Cuadra exacto: Valor total − Capital invertido = Resultado. Es mayor que la suma de tus operaciones registradas (ver subtítulo) porque incluye posiciones viejas de Allaria (pre-2024) y la cripto acumulada en Nexo, que no están en el log de operaciones que arranca en 2024."} />
        </div>
      </div>
    </div>
  );
}
function Kpi({ label, big, sub, tone, icon: Ic, tip }) {

/* ============================== cartera tab ============================== */
function Cartera({ rows, setHoldings, base, money, refRate }) {
  const [edit, setEdit] = useState(null);
  const [showImport, setShowImport] = useState(false);
  const [detail, setDetail] = useState(null);
  const [open, setOpen] = useState({});
  const r = refRate || 1;
  // ---- Backup / Restore: exporta TODO el estado a un .json y lo vuelve a cargar (sin backend) ----
  const backupRef = useRef(null);
  const BACKUP_KEYS = ["inv7_holdings", "inv6_aportes", "inv7_ops", "inv6_settings", "inv6_history"];
  const exportBackup = () => {
    try {
      const dump = { _app: "cartera-ar", _v: 1, exportedAt: new Date().toISOString(), data: {} };
      BACKUP_KEYS.forEach(k => { const v = localStorage.getItem(k); if (v != null) dump.data[k] = v; });
      const blob = new Blob([JSON.stringify(dump, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href = url; a.download = "cartera-backup_" + today() + ".json";
      document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    } catch (e) { alert("No pude generar el backup en este navegador."); }
  };
  const importBackup = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const obj = JSON.parse(reader.result);
        if (!obj || !obj.data || typeof obj.data !== "object") { alert("El archivo no parece un backup válido de la cartera."); return; }
        const keys = Object.keys(obj.data).filter(k => BACKUP_KEYS.includes(k));
        if (!keys.length) { alert("El backup no contiene datos reconocibles de la cartera."); return; }
        const fecha = obj.exportedAt ? obj.exportedAt.slice(0, 10) : "sin fecha";
        if (!window.confirm("Esto va a REEMPLAZAR toda tu cartera actual con la del backup (" + fecha + "). ¿Continuar?")) return;
        keys.forEach(k => { try { localStorage.setItem(k, obj.data[k]); } catch {} });
        alert("Backup restaurado. La app se va a recargar para tomar los datos.");
        location.reload();
      } catch (e) { alert("No pude leer el archivo. ¿Es el backup correcto (.json)?"); }
    };
    reader.readAsText(file);
  };
  // group by class, groups sorted by total value
  const groups = useMemo(() => {
    const m = {};
    rows.forEach(x => { (m[x.cls] = m[x.cls] || []).push(x); });
    return Object.entries(m).map(([cls, items]) => {
      items.sort((a, b) => b.m.valUSD - a.m.valUSD);

      const valARS = items.reduce((s, x) => s + x.m.valARS, 0);
      const pnlUSD = items.reduce((s, x) => s + x.m.pnlUSD, 0);
      const pnlARS = items.reduce((s, x) => s + x.m.pnlARS, 0);
      const costUSD = items.reduce((s, x) => s + x.m.costUSD, 0);
      return { cls, items, valUSD, valARS, pnlUSD, pnlARS, pct: costUSD ? (pnlUSD / costUSD) * 100 : 0 };
    }).sort((a, b) => b.valUSD - a.valUSD);

/* ---- importer: re-aggregates the INVERSION.xlsx format ---- */
function ImportModal({ onClose, setHoldings }) {
  const [err, setErr] = useState(""); const [preview, setPreview] = useState(null);
  const CLS = {AL30:"BONO_NAC",GD30:"BONO_NAC",GD41:"BONO_NAC",GGAL:"MERVAL",BYMA:"MERVAL",LOMA:"MERVAL",MIRG:"MERVAL",NVDA:"CEDEAR",GOOGL:"CEDEAR",KO:"CEDEAR",BRKB:"CEDEAR",CVX:"CEDEAR",MELI:"CEDEAR",SPY:"ETF",XLF:"ETF",BTC:"CRYPTO",USDT:"CRYPTO"};
  const CANON = {"ACCIONES - AL30":"AL30",MIRGOR:"MIRG","SPY&500":"SPY",SPY500:"SPY","S&P500":"SPY"};
  const num = (x) => { if (x == null || x === "") return NaN; if (typeof x === "number") return x; const v = parseFloat(String(x).replace(/\./g, "").replace(",", ".")); return isNaN(v) ? parseFloat(String(x).replace(",", ".")) : v; };

  const onFile = (e) => {
    const f = e.target.files?.[0]; if (!f) return; setErr("");
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb = XLSX.read(ev.target.result, { type: "array" });
        let txs = [];
        wb.SheetNames.forEach(sn => {
          const rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], { header: 1, raw: false, defval: "" });
          for (let i = 0; i < rows.length; i++) {
            if (String(rows[i][0]).trim().toLowerCase() === "fecha") {
              for (let j = i + 1; j < rows.length; j++) {
                const r = rows[j], f0 = String(r[0] || "");
                if (!f0 || f0.toUpperCase().includes("TOTAL")) break;
                const dt = new Date(r[0]); if (isNaN(dt)) continue;
                txs.push({ fecha: dt.toISOString().slice(0, 10), plat: String(r[1] || "").trim(), activo: String(r[2] || "").trim().toUpperCase(), monto: num(r[3]), cotiz: num(r[4]), mep: num(r[5]) });
              }
            }
          }
        });
        if (!txs.length) { setErr("No encontré transacciones con el formato Fecha/Plataforma/Activo/Monto/Cotización."); return; }
        txs.sort((a, b) => a.fecha.localeCompare(b.fecha));
        /* fill mep (forward then back) */
        let last = NaN; txs.forEach(t => { if (!isNaN(t.mep) && t.mep > 200 && t.mep < 3000) last = t.mep; else t.mep = last; });
        for (let k = txs.length - 1; k >= 0; k--) { if (isNaN(txs[k].mep)) txs[k].mep = txs[k + 1]?.mep; }
        const agg = {};
        txs.forEach(t => {
          const tk = CANON[t.activo] || t.activo; if (!tk || isNaN(t.monto)) return;
          const crypto = tk === "BTC" || tk === "USDT";
          let pAars;
          if (tk === "BTC") pAars = t.cotiz > 1e6 ? t.cotiz : t.cotiz * t.mep;
          else if (tk === "USDT") pAars = t.cotiz > 100 ? t.cotiz : t.mep;
          else pAars = t.cotiz;
          const qty = pAars ? t.monto / pAars : 0;
          const invUSD = t.mep ? t.monto / t.mep : 0;
          if (!agg[tk]) agg[tk] = { ticker: tk, qty: 0, investedARS: 0, investedUSD: 0, crypto, first: t.fecha, plat: t.plat };
          agg[tk].qty += qty; agg[tk].investedARS += t.monto; agg[tk].investedUSD += invUSD;
          if (t.fecha < agg[tk].first) agg[tk].first = t.fecha;
        });
        setPreview(Object.values(agg));
      } catch { setErr("No pude leer el archivo. Usá el .xlsx original."); }
    };
    reader.readAsArrayBuffer(f);
  };

  const apply = () => {
    const hs = preview.map(p => ({ id: uid(), ticker: p.ticker, name: p.ticker, cls: CLS[p.ticker] || "CEDEAR",
      broker: p.crypto ? "NEXO" : "BALANZ", currency: p.crypto ? "USD" : "ARS",
      qty: p.qty, investedARS: p.investedARS, investedUSD: p.investedUSD,
      avgNative: p.crypto ? p.investedUSD / p.qty : p.investedARS / p.qty,
      manualPrice: p.crypto ? p.investedUSD / p.qty : p.investedARS / p.qty,
      coingeckoId: CRYPTO_IDS[p.ticker] || "", firstDate: p.first, liveAt: null }));
    setHoldings(hs); onClose();
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal panel" style={{ padding: 24 }} onClick={e => e.stopPropagation()}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 14 }}>
          <h3 style={{ fontSize: 16, fontWeight: 600 }}>Reimportar INVERSION.xlsx</h3>
          <button className="btn-ghost btn" onClick={onClose}><X size={16} /></button></div>
        <p className="muted" style={{ fontSize: 12.5, marginBottom: 14, lineHeight: 1.5 }}>Subí tu Excel actualizado (con meses nuevos) y recalculo todas las posiciones desde cero: cantidad, costo promedio y dólares invertidos al MEP de cada compra. Esto <strong>reemplaza</strong> la cartera actual.</p>
        <input type="file" accept=".xlsx,.xls" onChange={onFile} className="input" style={{ padding: 9 }} />
        {err && <div style={{ color: "var(--loss)", fontSize: 12.5, marginTop: 10 }}><AlertTriangle size={12} /> {err}</div>}
        {preview && (<div style={{ marginTop: 14 }}>

          {card("Por día", rate.run.d, true)}{card("Por semana", rate.run.w)}{card("Por mes", rate.run.m)}{card("Por año", rate.run.y)}

function Aportes({ aportes, setAportes, aportesUSD, valUSD, setHoldings, refRate, ops, setOps }) {
  // Normaliza operaciones: consolida cripto en NEXO y completa el MEP faltante
  // a partir de operaciones previas (mismo día -> monto/USD -> arrastre cronológico).
  const list = useMemo(() => {
    const valid = m => m && m > 200 && m < 5000;
    const raw = (ops || []).map((o, i) => ({ ...o, _i: i })).sort((a, b) => a.date.localeCompare(b.date));
    const dayMep = {};
    raw.forEach(o => { if (valid(o.mep)) dayMep[o.date] = o.mep; });
    let last = null;
    const fwd = raw.map(o => {
      let mep = valid(o.mep) ? o.mep : null, est = false;
      if (!mep && o.montoARS && o.usd && valid(o.montoARS / o.usd)) mep = o.montoARS / o.usd;
      if (!mep && dayMep[o.date]) mep = dayMep[o.date];
      if (!mep) { mep = last; est = true; } else last = mep;
      return { ...o, mep: mep ? round2(mep) : null, mepEst: est };
    });
    let next = null;
    for (let i = fwd.length - 1; i >= 0; i--) { if (!fwd[i].mep) { fwd[i].mep = next; fwd[i].mepEst = true; } else next = fwd[i].mep; }
    return fwd.map(o => ({
      ...o,
      broker: (o.broker === "LEMON") ? "NEXO" : o.broker,
      usd: (o.usd != null && o.usd !== "") ? o.usd : (o.mep ? round2(o.montoARS / o.mep) : null),
    })).sort((a, b) => b.date.localeCompare(a.date));
  }, [ops]);
  const [op, setOp] = useState({ date: today(), broker: "BALANZ", ticker: "", cls: "CEDEAR", mode: "qty", qty: "", price: "", currency: "ARS", mep: "", montoARS: "", usdNeto: "" });
  const [msg, setMsg] = useState("");
  const [editOp, setEditOp] = useState(null);
  const [fy, setFy] = useState("todos"), [fm, setFm] = useState("todos"), [fa, setFa] = useState("todos"), [fb, setFb] = useState("todos");

  const years = useMemo(() => [...new Set(list.map(o => o.date.slice(0, 4)))].sort(), [list]);
  const activos = useMemo(() => [...new Set(list.map(o => o.activo))].sort(), [list]);
  const brokers = useMemo(() => [...new Set(list.map(o => o.broker))].sort(), [list]);
  const MESES = ["01", "02", "03", "04", "05", "06", "07", "08", "09", "10", "11", "12"];
  const MESNOM = { "01": "Ene", "02": "Feb", "03": "Mar", "04": "Abr", "05": "May", "06": "Jun", "07": "Jul", "08": "Ago", "09": "Sep", "10": "Oct", "11": "Nov", "12": "Dic" };

  const filtered = useMemo(() => list.filter(o =>
    (fy === "todos" || o.date.slice(0, 4) === fy) &&
    (fm === "todos" || o.date.slice(5, 7) === fm) &&
    (fa === "todos" || o.activo === fa) &&
    (fb === "todos" || o.broker === fb)
  ).sort((a, b) => b.date.localeCompare(a.date)), [list, fy, fm, fa, fb]);

  const sumARS = filtered.reduce((s, o) => s + (+o.montoARS || 0), 0);
  const sumUSD = filtered.reduce((s, o) => s + (+o.usd || 0), 0);
  const monthly = useMemo(() => {
    const m = {};
    filtered.forEach(o => { const k = o.date.slice(0, 7); m[k] = (m[k] || 0) + (+o.usd || 0); });
    return Object.entries(m).map(([mes, usd]) => ({ mes, usd })).sort((a, b) => a.mes.localeCompare(b.mes));
  }, [filtered]);

  // Vista previa del cálculo (cantidad, USD, costo, MEP efectivo) según el modo
  const prev = (() => {
    const price = +op.price, mep = +op.mep || refRate || 1;
    if (op.mode === "monto") {
      const m = +op.montoARS; if (!m || !price) return null;
      if (+op.usdNeto) { const usd = +op.usdNeto; return { qty: usd / price, usd, ars: m, mep: m / usd }; }
      const usd = m / mep;
      const qty = op.currency === "USD" ? usd / price : m / price;
      return { qty, usd, ars: m, mep: usd ? m / usd : mep };
    }
    const q = +op.qty; if (!q || !price) return null;
    const ars = op.currency === "ARS" ? q * price : q * price * mep;
    const usd = op.currency === "USD" ? q * price : q * price / mep;
    return { qty: q, usd, ars, mep: usd ? ars / usd : mep };
  })();

  const registerOp = () => {
    const tk = op.ticker.toUpperCase().trim(), price = +op.price, mep = +op.mep || refRate || 1;
    if (!tk) { setMsg("Completá el activo (ticker)."); return; }
    let qty, addARS, addUSD, effCur = op.currency;
    if (op.mode === "monto") {
      const montoARS = +op.montoARS;
      if (!montoARS || !price) { setMsg("Completá monto en ARS y precio."); return; }
      addARS = montoARS;
      if (+op.usdNeto) { effCur = "USD"; addUSD = +op.usdNeto; qty = addUSD / price; } // recibiste USD -> el precio es en USD
      else if (op.currency === "USD") { effCur = "USD"; addUSD = montoARS / mep; qty = addUSD / price; }
      else { effCur = "ARS"; addUSD = montoARS / mep; qty = montoARS / price; }
    } else {
      qty = +op.qty;
      if (!qty || !price) { setMsg("Completá nominales y precio."); return; }
      addARS = op.currency === "ARS" ? qty * price : qty * price * mep;
      addUSD = op.currency === "USD" ? qty * price : qty * price / mep;
    }
    const opMep = addUSD ? round2(addARS / addUSD) : round2(mep);
    setHoldings(hs => {
      const i = hs.findIndex(h => h.ticker === tk && h.broker === op.broker);
      if (i >= 0) { const h = hs[i]; return hs.map((x, j) => j === i ? { ...h, qty: (+h.qty || 0) + qty, investedARS: (+h.investedARS || 0) + addARS, investedUSD: (+h.investedUSD || 0) + addUSD, manualPrice: price, costEstimated: false } : x); }
      return [...hs, { id: uid(), ticker: tk, name: tk, cls: op.cls, broker: op.broker, currency: effCur, qty, investedARS: addARS, investedUSD: addUSD, manualPrice: price, coingeckoId: CRYPTO_IDS[tk] || "", firstDate: op.date, costEstimated: false, liveAt: null }];
    });
    setOps(o2 => [...(o2 || []), { date: op.date, broker: op.broker, activo: tk, montoARS: round2(addARS), mep: opMep, usd: round2(addUSD) }]);
    setMsg("✓ " + tk + ": +" + fmt(qty, qty < 1 ? 6 : 0) + " en " + op.broker + " (US$ " + fmt(addUSD, 0) + ")");
    setOp(o => ({ ...o, ticker: "", qty: "", price: "", mep: "", montoARS: "", usdNeto: "" }));
  };

  const download = () => {
    try {
      const rows = filtered.map(o => ({ Fecha: o.date, Broker: o.broker, Activo: o.activo, "Monto ARS": o.montoARS, "MEP": o.mep || "", "USD": o.usd || "" }));
      const ws = XLSX.utils.json_to_sheet(rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Operaciones");
      const tag = [fy !== "todos" && fy, fm !== "todos" && MESNOM[fm], fa !== "todos" && fa, fb !== "todos" && fb].filter(Boolean).join("_") || "todas";
      XLSX.writeFile(wb, `operaciones_${tag}.xlsx`);
    } catch (e) { alert("No pude generar el informe en este navegador."); }
  };

  const selStyle = { width: "auto", minWidth: 90 };
  return (
    <div style={{ display: "grid", gap: 16 }}>
      <div className="panel" style={{ padding: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12, marginBottom: 14 }}>
          <div className="eyebrow">Registro de operaciones · {filtered.length} de {list.length}</div>
          <button className="btn" onClick={download}><Upload size={14} style={{ transform: "rotate(180deg)" }} />Descargar informe</button>
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 }}>
          <div className="field"><label>Año</label><select className="sel" style={selStyle} value={fy} onChange={e => setFy(e.target.value)}><option value="todos">Todos</option>{years.map(y => <option key={y}>{y}</option>)}</select></div>
          <div className="field"><label>Mes</label><select className="sel" style={selStyle} value={fm} onChange={e => setFm(e.target.value)}><option value="todos">Todos</option>{MESES.map(m => <option key={m} value={m}>{MESNOM[m]}</option>)}</select></div>
          <div className="field"><label>Activo</label><select className="sel" style={selStyle} value={fa} onChange={e => setFa(e.target.value)}><option value="todos">Todos</option>{activos.map(a => <option key={a}>{a}</option>)}</select></div>
          <div className="field"><label>Broker</label><select className="sel" style={selStyle} value={fb} onChange={e => setFb(e.target.value)}><option value="todos">Todos</option>{brokers.map(b => <option key={b}>{b}</option>)}</select></div>
        </div>
        <div style={{ display: "flex", gap: 28, flexWrap: "wrap", marginBottom: 16 }}>
          <div><div className="eyebrow">Operaciones</div><div className="kpi-num" style={{ fontSize: 22, marginTop: 4 }}>{filtered.length}</div></div>
          <div><div className="eyebrow">Invertido (USD)</div><div className="kpi-num gold" style={{ fontSize: 22, marginTop: 4 }}>{fmtUSD(sumUSD)}</div></div>
          <div><div className="eyebrow">Invertido (ARS)</div><div className="kpi-num cel" style={{ fontSize: 22, marginTop: 4 }}>{fmtARS(sumARS)}</div></div>
          <div><div className="eyebrow">MEP prom. del período</div><div className="kpi-num" style={{ fontSize: 22, marginTop: 4, color: "var(--celeste)" }}>{sumUSD > 0 ? "$" + fmt(sumARS / sumUSD, 0) : "—"}</div></div>
        </div>
        {monthly.length > 0 && <ResponsiveContainer width="100%" height={180}><BarChart data={monthly}>
          <CartesianGrid stroke="#2A3946" strokeDasharray="2 4" vertical={false} />
          <XAxis dataKey="mes" stroke="#5C6F7E" fontSize={9} /><YAxis stroke="#5C6F7E" fontSize={11} tickFormatter={v => "$" + (v / 1000).toFixed(0) + "k"} />
          <Tooltip contentStyle={ttStyle} formatter={v => [fmtUSD(v), "Invertido"]} cursor={{ fill: "#1C2832" }} />
          <Bar dataKey="usd" fill="#CBA45E" radius={[3, 3, 0, 0]} /></BarChart></ResponsiveContainer>}
        <div className="scrollx" style={{ marginTop: 12, maxHeight: 360, overflow: "auto" }}>
          <table>
            <thead><tr><th className="l">Fecha</th><th className="l">Broker</th><th className="l">Activo</th><th>Monto ARS</th><th>MEP</th><th>USD</th><th></th></tr></thead>
            <tbody>
              {filtered.map((o, i) => (
                <tr key={i}>
                  <td className="l mono muted">{o.date}</td>
                  <td className="l">{o.broker}</td>
                  <td className="l" style={{ fontFamily: "var(--display)", fontWeight: 600 }}>{o.activo}</td>
                  <td className="mono">{fmt(o.montoARS, 0)}</td>
                  <td className="mono muted" title={o.mepEst ? "MEP estimado a partir de operaciones cercanas" : "MEP de la operación"}>{o.mep ? (o.mepEst ? "~" : "") + fmt(o.mep, 0) : "—"}</td>
                  <td className="mono gold">{o.usd ? fmt(o.usd, 0) : "—"}</td>
                  <td><button className="btn-ghost btn" style={{ padding: 6 }} title="Editar o borrar esta operación" onClick={() => setEditOp(o._i)}><Pencil size={13} /></button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        {filtered.length === 0 && <div className="empty" style={{ padding: 20 }}>No hay operaciones con esos filtros.</div>}
        <p className="muted" style={{ fontSize: 10.5, marginTop: 10, lineHeight: 1.45 }}>El <span className="mono">~</span> indica un MEP estimado a partir de operaciones cercanas (cuando el dato no venía en la operación). Las compras de cripto figuran por su plataforma real (<strong className="cel">Satoshi</strong>); las pocas de Lemon se muestran como <strong className="cel">Nexo</strong>.</p>
      </div>

      <div className="panel" style={{ padding: 20 }}>
        <div className="eyebrow" style={{ marginBottom: 4 }}>Registrar nueva operación de compra</div>
        <p className="muted" style={{ fontSize: 12, marginBottom: 14, lineHeight: 1.5 }}>Se suma al registro Y actualiza tu cartera. Para <strong className="cel">cripto</strong> o cuando sabés cuántos pesos pusiste, usá <strong>Por monto</strong>: cargás lo que pagaste y los dólares que recibiste, y la app calcula la cantidad y captura la comisión. Para acciones donde sabés los nominales, usá <strong>Por nominales</strong>.</p>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 8, alignItems: "end", marginBottom: 10 }}>
          <div className="field"><label>Fecha</label><input className="input" type="date" value={op.date} onChange={e => setOp(o => ({ ...o, date: e.target.value }))} /></div>
          <div className="field"><label>Broker</label><select className="sel" value={op.broker} onChange={e => setOp(o => ({ ...o, broker: e.target.value }))}>{BROKERS.map(b => <option key={b}>{b}</option>)}</select></div>
          <div className="field"><label>Activo</label><input className="input" placeholder="BTC" value={op.ticker} onChange={e => setOp(o => ({ ...o, ticker: e.target.value }))} /></div>
          <div className="field"><label>Clase</label><select className="sel" value={op.cls} onChange={e => setOp(o => ({ ...o, cls: e.target.value, currency: e.target.value === "CRYPTO" ? "USD" : o.currency, broker: e.target.value === "CRYPTO" ? "NEXO" : o.broker }))}>{CLASSES.map(c => <option key={c} value={c}>{CLASS_LABEL[c]}</option>)}</select></div>
          <div className="field"><label>Modo de carga</label><select className="sel" value={op.mode} onChange={e => setOp(o => ({ ...o, mode: e.target.value }))}><option value="qty">Por nominales</option><option value="monto">Por monto $</option></select></div>
          <div className="field"><label>Moneda del precio</label><select className="sel" value={op.currency} onChange={e => setOp(o => ({ ...o, currency: e.target.value }))}><option value="ARS">ARS</option><option value="USD">USD</option></select></div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 8, alignItems: "end" }}>
          {op.mode === "qty"
            ? <div className="field"><label>Nominales</label><input className="input mono" type="number" placeholder="100" value={op.qty} onChange={e => setOp(o => ({ ...o, qty: e.target.value }))} /></div>
            : <>
                <div className="field"><label>Monto ARS (total pagado)</label><input className="input mono" type="number" placeholder="3000000" value={op.montoARS} onChange={e => setOp(o => ({ ...o, montoARS: e.target.value }))} /></div>
                <div className="field"><label>USD recibido (opcional)</label><input className="input mono" type="number" placeholder="1935.11" value={op.usdNeto} onChange={e => setOp(o => ({ ...o, usdNeto: e.target.value }))} /></div>
              </>}
          <div className="field"><label>Precio del activo</label><input className="input mono" type="number" placeholder="62525.08" value={op.price} onChange={e => setOp(o => ({ ...o, price: e.target.value }))} /></div>
          <div className="field"><label>MEP / USDT del día (opcional)</label><input className="input mono" type="number" placeholder={refRate ? fmt(refRate, 0) : "1543"} value={op.mep} onChange={e => setOp(o => ({ ...o, mep: e.target.value }))} /></div>
        </div>
        <div style={{ display: "flex", gap: 12, alignItems: "center", marginTop: 14, flexWrap: "wrap" }}>
          <button className="btn-accent btn" onClick={registerOp}><Plus size={14} />Registrar compra</button>
          {prev && <span className="mono muted" style={{ fontSize: 12 }}>→ +{fmt(prev.qty, prev.qty < 1 ? 6 : 2)} {op.ticker.toUpperCase() || "?"} · US$ {fmt(prev.usd, 0)} · costo {fmtARS(prev.ars)} · MEP efectivo {fmt(prev.mep, 0)}</span>}
          {msg && <span className="mono" style={{ fontSize: 12, color: msg.startsWith("✓") ? "var(--gain)" : "var(--loss)" }}>{msg}</span>}
        </div>
      </div>
      {editOp != null && ops[editOp] && <OpEditModal op={ops[editOp]} idx={editOp} onClose={() => setEditOp(null)} setOps={setOps} />}
    </div>
  );
}

/* ============================== proyección tab ============================== */
function Proyeccion({ rows, settings, setSettings, classStats }) {
  // base SIN cripto
  const valByClass = useMemo(() => { const m = {}; rows.filter(r => r.cls !== "CRYPTO").forEach(r => { m[r.cls] = (m[r.cls] || 0) + r.m.valUSD; }); return m; }, [rows]);
  const totalNow = Object.values(valByClass).reduce((a, b) => a + b, 0);
  const monthly = +settings.monthlyAporteUSD || 0;
  // retorno usado por clase: override del usuario si existe, si no el real de la cartera
  const ovr = settings.projReturns || {};
  const retOf = (c) => ovr[c] != null ? ovr[c] : Math.round((classStats[c]?.ann || 0) * 10) / 10;
  const series = useMemo(() => {
    const out = [{ year: 0, base: totalNow, conAportes: totalNow }]; let base = totalNow, conA = totalNow;
    const wRet = totalNow ? Object.entries(valByClass).reduce((s, [c, v]) => s + v * (retOf(c) / 100), 0) / totalNow : 0;
    for (let y = 1; y <= 10; y++) { base = base * (1 + wRet); conA = conA * (1 + wRet) + monthly * 12; out.push({ year: y, base, conAportes: conA }); }
    return { out, wRet };
  }, [valByClass, totalNow, settings, monthly, classStats]);
  const usarReal = () => setSettings(s => ({ ...s, projReturns: {} }));
  return (
    <div style={{ display: "grid", gridTemplateColumns: "1.5fr 1fr", gap: 16 }}>
      <div className="panel" style={{ padding: 20 }}>
        <div className="eyebrow" style={{ marginBottom: 4 }}>Proyección a 10 años · cartera invertida sin cripto</div>
        <p className="muted" style={{ fontSize: 11.5, marginBottom: 12 }}>Parte de tu valor real ({fmtUSD(totalNow)}) y del <strong>rendimiento anualizado real de cada clase</strong> tomado de Cartera. Retorno ponderado: <strong className="gold">{fmtPct(series.wRet * 100)}</strong>. Editá los supuestos si querés simular otro escenario.</p>
        <ResponsiveContainer width="100%" height={300}><AreaChart data={series.out}>
          <defs><linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#43C28A" stopOpacity={.4} /><stop offset="100%" stopColor="#43C28A" stopOpacity={0} /></linearGradient>
          <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#74ACDF" stopOpacity={.35} /><stop offset="100%" stopColor="#74ACDF" stopOpacity={0} /></linearGradient></defs>
          <CartesianGrid stroke="#2A3946" strokeDasharray="2 4" vertical={false} />
          <XAxis dataKey="year" stroke="#5C6F7E" fontSize={11} tickFormatter={v => "A" + v} /><YAxis stroke="#5C6F7E" fontSize={11} tickFormatter={v => "$" + (v / 1000).toFixed(0) + "k"} />
          <Tooltip contentStyle={ttStyle} formatter={(v, n) => [fmtUSD(v), n === "conAportes" ? "Con aportes" : "Solo capitalización"]} labelFormatter={l => "Año " + l} />
          <Area type="monotone" dataKey="conAportes" stroke="#43C28A" strokeWidth={2} fill="url(#gA)" />
          <Area type="monotone" dataKey="base" stroke="#74ACDF" strokeWidth={2} fill="url(#gB)" /></AreaChart></ResponsiveContainer>
        <div style={{ display: "flex", gap: 24, marginTop: 8 }}>
          <div><div className="eyebrow">10 años s/aportes</div><div className="kpi-num cel" style={{ fontSize: 20, marginTop: 4 }}>{fmtUSD(series.out[10].base)}</div></div>
          <div><div className="eyebrow gain">10 años con aportes</div><div className="kpi-num gain" style={{ fontSize: 20, marginTop: 4 }}>{fmtUSD(series.out[10].conAportes)}</div></div>
        </div>
      </div>
      <div className="panel" style={{ padding: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
          <div className="eyebrow">Retorno anual por clase (%)</div>
          <button className="btn-ghost btn" style={{ fontSize: 11, padding: "4px 8px" }} onClick={usarReal}>Usar real</button>
        </div>
        {CLASSES.filter(c => c !== "CRYPTO" && valByClass[c]).map(c => {
          const real = Math.round((classStats[c]?.ann || 0) * 10) / 10;
          return (
            <div key={c} style={{ display: "grid", gridTemplateColumns: "1fr 70px", gap: 10, alignItems: "center", marginBottom: 9 }}>
              <span style={{ fontSize: 12.5, color: CLASS_COLOR[c] }}>{CLASS_LABEL[c]}<span className="muted mono" style={{ fontSize: 10, marginLeft: 6 }}>real {fmtPct(real)}</span></span>
              <input className="input mono" type="number" value={retOf(c)} onChange={e => setSettings(s => ({ ...s, projReturns: { ...(s.projReturns || {}), [c]: +e.target.value } }))} /></div>);
        })}
        <div style={{ borderTop: "1px solid var(--line)", marginTop: 12, paddingTop: 12 }}>
          <div className="eyebrow" style={{ marginBottom: 6 }}>Aporte mensual proyectado (US$)</div>
          <input className="input mono" type="number" value={settings.monthlyAporteUSD} onChange={e => setSettings(s => ({ ...s, monthlyAporteUSD: +e.target.value }))} /></div>
        <p className="muted" style={{ fontSize: 10.5, marginTop: 12, lineHeight: 1.5 }}>Cripto queda fuera de la proyección: su retorno depende del ciclo y no es proyectable con un CAGR fijo.</p>
      </div>
    </div>
  );
}

/* ============================== histórico tab ============================== */
function Historico() {
  const H = BAL_HIST;
  const capitalNeto = H.depositos + H.extracciones + H.transfRecibidos + H.transfEnviados;
  const ganancia = H.tenencia + H.dividendos + H.cupones + H.gastos + H.ajustes;
  // waterfall: cumulative base + delta
  const steps = [
    { name: "Capital neto", val: capitalNeto, type: "cap" },
    { name: "Resultado tenencia", val: H.tenencia, type: "pos" },
    { name: "Cupones", val: H.cupones, type: "pos" },
    { name: "Dividendos", val: H.dividendos, type: "pos" },
    { name: "Ajustes", val: H.ajustes, type: "pos" },
    { name: "Gastos", val: H.gastos, type: "neg" },
  ];
  let cum = 0; const data = steps.map(s => { const base = s.val >= 0 ? cum : cum + s.val; cum += s.val; return { name: s.name, base, delta: Math.abs(s.val), type: s.type, raw: s.val }; });
  data.push({ name: "Valor final", base: 0, delta: H.valorFinal, type: "final", raw: H.valorFinal });
  const colorOf = (t) => t === "cap" ? "#74ACDF" : t === "final" ? "#CBA45E" : t === "neg" ? "#E8604C" : "#43C28A";
  const line = (label, v, tone) => (
    <div style={{ display: "flex", justifyContent: "space-between", padding: "10px 0", borderBottom: "1px solid var(--line)" }}>
      <span className="muted" style={{ fontSize: 13 }}>{label}</span>
      <span className={"mono " + (tone || "")} style={{ fontSize: 13 }}>{(v >= 0 ? "" : "−") + "US$ " + fmt(Math.abs(v), 0)}</span>
    </div>
  );
  return (
    <div style={{ display: "grid", gap: 16 }}>
      <div className="panel" style={{ padding: "22px 24px", background: "linear-gradient(135deg,#16212B,#131C24)" }}>
        <div className="eyebrow">Resultado histórico Balanz · desde {H.desde}</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 36, marginTop: 12, alignItems: "flex-end" }}>
          <div><div className="eyebrow">Valor de la cuenta hoy</div><div className="kpi-num gold" style={{ fontSize: 36, marginTop: 6 }}>{fmtUSD(H.valorFinal)}</div></div>
          <div><div className="eyebrow cel">Capital neto que pusiste</div><div className="kpi-num cel" style={{ fontSize: 24, marginTop: 6 }}>{fmtUSD(capitalNeto)}</div></div>
          <div><div className="eyebrow gain">Ganancia que generó</div><div className="kpi-num gain" style={{ fontSize: 24, marginTop: 6 }}>+{fmtUSD(ganancia)}</div>
            <div className="mono gain" style={{ fontSize: 12, marginTop: 2 }}>{fmtPct(ganancia / capitalNeto * 100)} sobre el capital</div></div>
        </div>
      </div>

      <div className="panel" style={{ padding: 20 }}>
        <div className="eyebrow" style={{ marginBottom: 4 }}>Cómo se construyó tu cuenta (US$)</div>
        <p className="muted" style={{ fontSize: 11.5, marginBottom: 18 }}>De US$ 0 en 2017 a US$ {fmt(H.valorFinal, 0)} hoy. La clave: <strong className="cel">{fmtUSD(capitalNeto)}</strong> que aportaste de tu bolsillo + <strong className="gain">{fmtUSD(ganancia)}</strong> que generó solo sosteniendo posiciones.</p>

        {/* barra principal: capital vs ganancia */}
        <div style={{ marginBottom: 8 }}>
          <div style={{ display: "flex", height: 56, borderRadius: 8, overflow: "hidden", border: "1px solid var(--line)" }}>
            <div style={{ width: (capitalNeto / H.valorFinal * 100) + "%", background: "linear-gradient(135deg,#74ACDF,#5B91C4)", display: "flex", flexDirection: "column", justifyContent: "center", padding: "0 14px", color: "#08151F" }}>
              <span style={{ fontSize: 10.5, fontWeight: 600, letterSpacing: ".04em" }}>CAPITAL APORTADO</span>
              <span className="mono" style={{ fontSize: 15, fontWeight: 700 }}>{fmtUSD(capitalNeto)}</span>
            </div>
            <div style={{ width: (ganancia / H.valorFinal * 100) + "%", background: "linear-gradient(135deg,#43C28A,#34A472)", display: "flex", flexDirection: "column", justifyContent: "center", padding: "0 14px", color: "#08151F" }}>
              <span style={{ fontSize: 10.5, fontWeight: 600, letterSpacing: ".04em" }}>GANANCIA GENERADA</span>
              <span className="mono" style={{ fontSize: 15, fontWeight: 700 }}>+{fmtUSD(ganancia)}</span>
            </div>
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6 }}>
            <span className="muted mono" style={{ fontSize: 11 }}>{(capitalNeto / H.valorFinal * 100).toFixed(0)}% es tuyo</span>
            <span className="muted mono" style={{ fontSize: 11 }}>{(ganancia / H.valorFinal * 100).toFixed(0)}% lo generó el mercado · = {fmtUSD(H.valorFinal)} hoy</span>
          </div>
        </div>

        {/* desglose de la ganancia */}
        <div className="eyebrow" style={{ margin: "20px 0 10px" }}>De dónde salió esa ganancia</div>
        {[["Suba de tus posiciones", H.tenencia, "#43C28A"], ["Cupones de bonos", H.cupones, "#5FC9A0"], ["Dividendos", H.dividendos, "#7AD0B0"], ["Ajustes", H.ajustes, "#95D8C2"], ["Gastos y comisiones", H.gastos, "#E8604C"]].map(([lbl, v, col]) => {
          const pct = Math.abs(v) / (H.tenencia + H.cupones + H.dividendos + H.ajustes) * 100;
          return (
            <div key={lbl} style={{ display: "grid", gridTemplateColumns: "150px 1fr 110px", gap: 12, alignItems: "center", marginBottom: 8 }}>
              <span className="muted" style={{ fontSize: 12 }}>{lbl}</span>
              <div style={{ height: 14, background: "var(--surface2)", borderRadius: 4, overflow: "hidden" }}>
                <div style={{ width: Math.min(100, pct) + "%", height: "100%", background: col, opacity: v < 0 ? .85 : 1 }} />
              </div>
              <span className={"mono " + (v >= 0 ? "gain" : "loss")} style={{ fontSize: 12.5, textAlign: "right" }}>{(v >= 0 ? "+" : "−") + "US$ " + fmt(Math.abs(v), 0)}</span>
            </div>);
        })}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        <div className="panel" style={{ padding: "18px 22px" }}>
          <div className="eyebrow" style={{ marginBottom: 6 }}>Detalle del resultado</div>
          {line("Resultado por tenencia", H.tenencia, "gain")}
          {line("Cupones cobrados", H.cupones, "gain")}
          {line("Dividendos cobrados", H.dividendos, "gain")}
          {line("Ajustes", H.ajustes, "gain")}
          {line("Gastos / comisiones", H.gastos, "loss")}
          <div style={{ display: "flex", justifyContent: "space-between", padding: "12px 0 2px", marginTop: 4 }}>
            <span style={{ fontSize: 13, fontWeight: 600 }}>Ganancia total</span>
            <span className="mono gain" style={{ fontSize: 15, fontWeight: 600 }}>+US$ {fmt(ganancia, 0)}</span>
          </div>
        </div>
        <div className="panel" style={{ padding: "18px 22px" }}>
          <div className="eyebrow" style={{ marginBottom: 6 }}>Flujo de capital</div>
          {line("Depósitos / suscripciones", H.depositos, "cel")}
          {line("Extracciones / rescates", H.extracciones, "loss")}
          {line("Títulos transferidos (recibidos)", H.transfRecibidos, "cel")}
          {line("Títulos transferidos (enviados)", H.transfEnviados, "loss")}
          <div style={{ display: "flex", justifyContent: "space-between", padding: "12px 0 2px", marginTop: 4 }}>
            <span style={{ fontSize: 13, fontWeight: 600 }}>Capital neto</span>
            <span className="mono cel" style={{ fontSize: 15, fontWeight: 600 }}>US$ {fmt(capitalNeto, 0)}</span>
          </div>
          <p className="muted" style={{ fontSize: 10.5, marginTop: 8, lineHeight: 1.6 }}>Los números en <span className="loss">rojo</span> son <strong>salidas</strong>, no pérdidas: plata o títulos que <strong>sacaste</strong> de Balanz (rescates {fmtUSD(Math.abs(H.extracciones))}, y títulos que enviaste a otro lado {fmtUSD(Math.abs(H.transfEnviados))} — probablemente a Allaria). Capital neto = lo que entró menos lo que salió = lo que realmente pusiste de tu bolsillo.</p>
          <div style={{ marginTop: 14, padding: "12px 14px", background: "var(--surface2)", borderRadius: 10, border: "1px solid var(--line)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}><Coins size={14} className="gold" /><span className="eyebrow">Resultado de trading</span></div>
            <p className="muted" style={{ fontSize: 12, margin: "8px 0 0", lineHeight: 1.5 }}>Comprar y vender en el mercado te dejó <strong className={H.tradingNeto >= 0 ? "gain" : "loss"}>≈ {(H.tradingNeto >= 0 ? "+" : "−") + "US$ " + fmt(Math.abs(H.tradingNeto), 0)}</strong> (prácticamente cero). Tu ganancia viene de <strong>sostener</strong>, no de operar.</p>
          </div>
        </div>
      </div>
      <div className="panel" style={{ padding: 20 }}>
        <div className="eyebrow" style={{ marginBottom: 4 }}>Allaria · tu historia en dólares (2017 → hoy)</div>
        <p className="muted" style={{ fontSize: 11.5, marginBottom: 14, lineHeight: 1.55 }}>Reconstruido de tus estados de cuenta viejos de Allaria, llevado a dólares con el <strong className="cel">CCL de cada fecha</strong>. La lección está a la vista: en pesos parecía crecer sin parar, pero <strong className="loss">en dólares tu cuenta cayó de ~US$ 18.500 (2017) a ~US$ 4.000 (fines de 2019)</strong> y recién después recuperó. Es justo lo que tu cartera dolarizada y diversificada de hoy ya no repite.</p>
        <ResponsiveContainer width="100%" height={280}><AreaChart data={HIST_ALLARIA}>
          <defs><linearGradient id="gHA" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#CBA45E" stopOpacity={.45} /><stop offset="100%" stopColor="#CBA45E" stopOpacity={0} /></linearGradient></defs>
          <CartesianGrid stroke="#2A3946" strokeDasharray="2 4" vertical={false} />
          <XAxis dataKey="label" stroke="#5C6F7E" fontSize={11} />
          <YAxis stroke="#5C6F7E" fontSize={11} tickFormatter={v => "$" + (v / 1000).toFixed(0) + "k"} />
          <Tooltip contentStyle={ttStyle} formatter={(v) => [fmtUSD(v), "Valor en Allaria"]} />
          <Area type="monotone" dataKey="usd" stroke="#CBA45E" strokeWidth={2.5} fill="url(#gHA)" dot={{ r: 3.5, fill: "#CBA45E", stroke: "#0D1318", strokeWidth: 1.5 }} />
        </AreaChart></ResponsiveContainer>
        <div className="scrollx" style={{ marginTop: 8 }}>
          <table>
            <thead><tr><th className="l">Fecha</th><th>Valor (ARS)</th><th>CCL usado</th><th>Valor (USD)</th><th className="l">Fuente</th></tr></thead>
            <tbody>{HIST_ALLARIA.map((p, i) => (
              <tr key={i}>
                <td className="l" style={{ fontFamily: "var(--display)", fontWeight: 600 }}>{p.label}</td>
                <td className="mono muted">{fmt(p.ars, 0)}</td>
                <td className="mono muted">{fmt(p.ccl, p.ccl < 100 ? 2 : 0)}</td>
                <td className="mono gold">{fmtUSD(p.usd)}</td>
                <td className="l muted" style={{ fontSize: 11 }}>{p.nota}</td>
              </tr>))}</tbody>
          </table>
        </div>
        <p className="muted" style={{ fontSize: 10.5, marginTop: 10, lineHeight: 1.5 }}>Valores en USD <strong>aproximados</strong>: cada foto de tenencia se divide por el CCL de esa fecha (2017 usa el TC implícito del propio resumen). El punto de mayo 2023 es solo acciones (los FCI los rescataste en 2019). Es únicamente la cuenta de <strong>Allaria</strong> — Balanz y Nexo no existían entonces. El salto de 2023 a hoy mezcla nuevas compras, dolarización y ganancia.</p>
      </div>
      <p className="muted" style={{ fontSize: 11, lineHeight: 1.5 }}><History size={11} style={{ verticalAlign: -1 }} /> Datos oficiales de la página "Evolución Histórica" de Balanz (USD). Corresponde solo a la cuenta de Balanz; Allaria y Nexo no exponen este desglose. El "Resultado por tenencia" incluye lo realizado y lo no realizado a lo largo de toda la vida de la cuenta — distinto del resultado no realizado sobre tus tenencias de hoy que ves en las otras pestañas.</p>
    </div>
  );
}

/* ============================== IA tab ============================== */
function IA({ rows, totals, macro, pnlPct }) {
  const [riskOut, setRiskOut] = useState(""); const [newsOut, setNewsOut] = useState("");
  const [loadingR, setLoadingR] = useState(false); const [loadingN, setLoadingN] = useState(false);
  const [errR, setErrR] = useState(""); const [errN, setErrN] = useState("");
  const hasKeyVar = typeof window !== "undefined" && "__ANTHROPIC_KEY__" in window;
  const [keyInput, setKeyInput] = useState((typeof window !== "undefined" && window.__ANTHROPIC_KEY__) || "");
  const [keySaved, setKeySaved] = useState(!!(typeof window !== "undefined" && window.__ANTHROPIC_KEY__));
  const saveKey = () => { if (typeof window !== "undefined") { window.__ANTHROPIC_KEY__ = keyInput.trim(); try { localStorage.setItem("ANTHROPIC_KEY", keyInput.trim()); } catch {} } setKeySaved(!!keyInput.trim()); };
  const needKey = hasKeyVar && !keySaved; // estamos en HTML local sin key cargada
  const portfolioStr = () => rows.map(r => `${r.ticker} (${CLASS_LABEL[r.cls]}): ${((r.m.valUSD / totals.valUSD) * 100).toFixed(1)}%, P&L USD ${fmtPct(r.m.pnlPctUSD)}`).join("; ");
  const callClaude = async (prompt, search) => {
    const body = { model: "claude-sonnet-4-6", max_tokens: 1000, messages: [{ role: "user", content: prompt }] };
    if (search) body.tools = [{ type: "web_search_20250305", name: "web_search" }];
    const headers = { "Content-Type": "application/json" };
    const k = (typeof window !== "undefined") && window.__ANTHROPIC_KEY__;
    if (k) { headers["x-api-key"] = k; headers["anthropic-version"] = "2023-06-01"; headers["anthropic-dangerous-direct-browser-access"] = "true"; }
    const res = await fetch("https://api.anthropic.com/v1/messages", { method: "POST", headers, body: JSON.stringify(body) });
    if (res.status === 401 || res.status === 403) throw new Error("KEY");
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || "API");
    return (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n").trim();
  };
  const errMsg = (e) => e && e.message === "KEY" ? "Tu API key falta o es inválida. Cargala arriba." : "Error al consultar la IA. Reintentá.";
  const runRisk = async () => {
    if (needKey) { setErrR("Pegá tu API key de Anthropic arriba para activar la IA."); return; }
    setLoadingR(true); setErrR(""); setRiskOut("");
    try {
      const p = `Sos un analista de riesgo especializado en el mercado argentino. Analizá esta cartera y devolvé un análisis CONCISO y accionable en español rioplatense.
CARTERA: ${portfolioStr()}
Valor total: ${fmtUSD(totals.valUSD)} | Resultado: ${fmtPct(pnlPct)}
Macro hoy: MEP $${macro.dolares?.bolsa?.venta || "?"}, CCL $${macro.dolares?.contadoconliqui?.venta || "?"}, Riesgo País ${macro.riesgo?.valor || "?"} pb.
Buscá en la web el contexto MÁS ACTUAL de Argentina (cepo/BCRA, CNV, situación de los activos) y evaluá: 1) CONCENTRACIÓN 2) RIESGO CAMBIARIO 3) RIESGO SOBERANO/PAÍS 4) RIESGO REGULATORIO 5) LIQUIDEZ. Cerrá con NIVEL DE RIESGO GLOBAL (Bajo/Medio/Alto) y 3 acciones priorizadas. Viñetas con "-". Máx 350 palabras. No des consejo financiero personalizado, solo análisis de riesgo objetivo.`;
      setRiskOut(await callClaude(p, true) || "No obtuve respuesta. Reintentá.");
    } catch (e) { setErrR(errMsg(e)); } finally { setLoadingR(false); }
  };
  const runNews = async () => {
    if (needKey) { setErrN("Pegá tu API key de Anthropic arriba para activar la IA."); return; }
    setLoadingN(true); setErrN(""); setNewsOut("");
    try {
      const top = [...rows].sort((a, b) => b.m.valUSD - a.m.valUSD).slice(0, 6).map(r => r.ticker).join(", ");
      const p = `Sos analista de mercado. Buscá en la web las noticias MÁS RECIENTES y relevantes (últimas semanas) que puedan mover el precio de estos activos de una cartera argentina: ${top}. Priorizá balances/resultados, cambios de management, M&A, decisiones regulatorias y macro argentina. Formato por activo, máx 2 ítems: **TICKER** luego "- [titular] — por qué importa". Omití los que no tengan novedades. Máx 350 palabras, con fechas.`;
      setNewsOut(await callClaude(p, true) || "Sin noticias relevantes ahora. Reintentá.");
    } catch (e) { setErrN(errMsg(e)); } finally { setLoadingN(false); }
  };
  const render = (txt) => txt.split("\n").map((line, i) => <div key={i} dangerouslySetInnerHTML={{ __html: line.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>") }} style={{ marginBottom: line.trim() ? 3 : 8 }} />);
  return (
    <div style={{ display: "grid", gap: 16 }}>
      {hasKeyVar && (
        <div className="panel" style={{ padding: 16, border: needKey ? "1px solid #CBA45E66" : "1px solid var(--line)", background: needKey ? "rgba(203,164,94,.06)" : "var(--surface)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: needKey ? 8 : 0 }}>
            <Brain size={15} className={keySaved ? "gain" : "gold"} />
            <span className="eyebrow">{keySaved ? "IA activada en esta versión local" : "Activar IA — pegá tu API key de Anthropic"}</span>
          </div>
          {!keySaved && <p className="muted" style={{ fontSize: 11.5, lineHeight: 1.55, marginBottom: 10 }}>El análisis con IA llama a la API de Anthropic. En esta versión local (HTML) necesita tu propia key (la guarda solo en este navegador, no se comparte). La sacás de console.anthropic.com → API Keys. Dentro de Claude no hace falta.</p>}
          <div style={{ display: "flex", gap: 8 }}>
            <input className="input mono" type="password" placeholder="sk-ant-..." value={keyInput} onChange={e => setKeyInput(e.target.value)} style={{ flex: 1 }} />
            <button className="btn-accent btn" onClick={saveKey}>{keySaved ? "Actualizar" : "Activar"}</button>
          </div>
        </div>
      )}
      <div className="panel" style={{ padding: 22 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12 }}>
          <div style={{ maxWidth: 560 }}><h3 style={{ fontSize: 16, fontWeight: 600, display: "flex", alignItems: "center", gap: 8 }}><Brain size={18} className="cel" />Análisis de riesgo con IA</h3>
            <p className="muted" style={{ fontSize: 12.5, marginTop: 6, lineHeight: 1.55 }}>Claude lee tu cartera real y busca el contexto argentino del momento (cepo, BCRA, CNV, riesgo país) para evaluar concentración y riesgos cambiario, soberano, regulatorio y de liquidez.</p></div>
          <button className="btn-accent btn" onClick={runRisk} disabled={loadingR}>{loadingR ? <Loader2 size={15} className="spin" /> : <Brain size={15} />}{loadingR ? "Analizando…" : "Analizar riesgo"}</button>
        </div>
        {errR && <div style={{ color: "var(--loss)", fontSize: 12.5, marginTop: 12 }}><AlertTriangle size={12} /> {errR}</div>}
        {riskOut && <div className="ai-out" style={{ marginTop: 18, paddingTop: 16, borderTop: "1px solid var(--line)" }}>{render(riskOut)}</div>}
      </div>
      <div className="panel" style={{ padding: 22 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12 }}>
          <div style={{ maxWidth: 560 }}><h3 style={{ fontSize: 16, fontWeight: 600, display: "flex", alignItems: "center", gap: 8 }}><Newspaper size={18} className="gold" />Noticias que mueven tus activos</h3>
            <p className="muted" style={{ fontSize: 12.5, marginTop: 6, lineHeight: 1.55 }}>Búsqueda en vivo de balances, resultados, management y catalizadores macro para tus principales tenencias.</p></div>
          <button className="btn" onClick={runNews} disabled={loadingN}>{loadingN ? <Loader2 size={15} className="spin" /> : <Newspaper size={15} />}{loadingN ? "Buscando…" : "Traer noticias"}</button>
        </div>
        {errN && <div style={{ color: "var(--loss)", fontSize: 12.5, marginTop: 12 }}><AlertTriangle size={12} /> {errN}</div>}
        {newsOut && <div className="ai-out" style={{ marginTop: 18, paddingTop: 16, borderTop: "1px solid var(--line)" }}>{render(newsOut)}</div>}
      </div>
    </div>
  );
}

/* ============================== disclaimer ============================== */
function Disclaimer() {
  return (
    <div style={{ marginTop: 30, padding: "16px 18px", border: "1px solid var(--line)", borderRadius: 12, background: "var(--surface)", display: "flex", gap: 12, alignItems: "flex-start" }}>
      <ShieldCheck size={16} className="cel" style={{ flexShrink: 0, marginTop: 2 }} />
      <p className="muted" style={{ fontSize: 11.5, lineHeight: 1.6, margin: 0 }}>
        Herramienta de seguimiento y soporte a la decisión, de uso personal. No se conecta a tus cuentas de Allaria, Balanz ni Nexo, no guarda credenciales y no opera: vos cargás las posiciones. Los datos quedan en este navegador. El análisis con IA es objetivo y no constituye asesoramiento financiero personalizado. Verificá las cotizaciones en tu broker antes de operar.
      </p>
    </div>
  );
}
