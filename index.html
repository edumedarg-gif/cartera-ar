function IA({ rows, totals, macro, pnlPct }) {
  const [riskOut, setRiskOut] = useState(""); const [newsOut, setNewsOut] = useState("");
  const [riskAt, setRiskAt] = useState(null); const [newsAt, setNewsAt] = useState(null);
  const [loadingR, setLoadingR] = useState(false); const [loadingN, setLoadingN] = useState(false);
  const [errR, setErrR] = useState(""); const [errN, setErrN] = useState("");
  const hasKeyVar = typeof window !== "undefined" && "__ANTHROPIC_KEY__" in window;
  const [keyInput, setKeyInput] = useState((typeof window !== "undefined" && window.__ANTHROPIC_KEY__) || "");
  const [keySaved, setKeySaved] = useState(!!(typeof window !== "undefined" && window.__ANTHROPIC_KEY__));
  const saveKey = () => { if (typeof window !== "undefined") { window.__ANTHROPIC_KEY__ = keyInput.trim(); try { localStorage.setItem("ANTHROPIC_KEY", keyInput.trim()); } catch {} } setKeySaved(!!keyInput.trim()); };
  const needKey = hasKeyVar && !keySaved; // estamos en HTML local sin key cargada
  const portfolioStr = () => rows.map(r => `${r.ticker} (${CLASS_LABEL[r.cls]}): ${((r.m.valUSD / totals.valUSD) * 100).toFixed(1)}%, P&L USD ${fmtPct(r.m.pnlPctUSD)}`).join("; ");
  const callClaude = async (prompt, search, maxTokens) => {
    const body = { model: "claude-sonnet-4-6", max_tokens: maxTokens || 1000, messages: [{ role: "user", content: prompt }] };
    if (search) body.tools = [{ type: "web_search_20250305", name: "web_search" }];
    const headers = { "Content-Type": "application/json" };
    const k = (typeof window !== "undefined") && window.__ANTHROPIC_KEY__;
    if (k) { headers["x-api-key"] = k; headers["anthropic-version"] = "2023-06-01"; headers["anthropic-dangerous-direct-browser-access"] = "true"; }
    let res;
    try { res = await fetch("https://api.anthropic.com/v1/messages", { method: "POST", headers, body: JSON.stringify(body) }); }
    catch (e) { throw new Error("NET"); }
    let data = {};
    try { data = await res.json(); } catch {}
    if (!res.ok || data.error) {
      const msg = (data.error && data.error.message) || ("HTTP " + res.status);
      const low = msg.toLowerCase();
      if (res.status === 401 || res.status === 403 || low.includes("api-key") || low.includes("authentication") || low.includes("x-api-key")) throw new Error("KEY");
      if (res.status === 402 || low.includes("credit") || low.includes("balance") || low.includes("billing") || low.includes("insufficient")) throw new Error("CREDIT");
      if (res.status === 429 || low.includes("rate limit")) throw new Error("RATE");
      throw new Error(msg);
    }
    return (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n").trim();
  };
  const errMsg = (e) => {
    const m = e && e.message;
    if (m === "KEY") return "La API key falta o es inválida. Verificá que la pegaste completa (empieza con sk-ant-) y que no esté revocada.";
    if (m === "CREDIT") return "Tu cuenta de API no tiene saldo. Entrá a console.anthropic.com → Billing y cargá créditos (con US$5 alcanza). Crear la key y cargar saldo son pasos distintos.";
    if (m === "RATE") return "Demasiados pedidos por ahora. Esperá unos segundos y reintentá.";
    if (m === "NET") return "No se pudo conectar con la API (bloqueo de red o CORS). Usá la versión publicada en Vercel (https), no el archivo abierto como file:// local.";
    return "Error de la API: " + (m || "desconocido");
  };
  const runRisk = async () => {
    if (needKey) { setErrR("Pegá tu API key de Anthropic arriba para activar la IA."); return; }
    setLoadingR(true); setErrR(""); setRiskOut("");
    try {
      const p = `Sos un analista de riesgo especializado en el mercado argentino. Analizá esta cartera y devolvé un análisis CONCISO y accionable en español rioplatense.
CARTERA: ${portfolioStr()}
Valor total: ${fmtUSD(totals.valUSD)} | Resultado: ${fmtPct(pnlPct)}
Macro hoy: MEP $${macro.dolares?.bolsa?.venta || "?"}, CCL $${macro.dolares?.contadoconliqui?.venta || "?"}, Riesgo País ${macro.riesgo?.valor || "?"} pb.

      setRiskOut(await callClaude(p, true, 2000) || "No obtuve respuesta. Reintentá."); setRiskAt(new Date());
    } catch (e) { setErrR(errMsg(e)); } finally { setLoadingR(false); }
  };
  const runNews = async () => {

    setLoadingN(true); setErrN(""); setNewsOut("");

Estructurá en TRES bloques:
**PANORAMA ARGENTINO** — máx 3 ítems: dólar/BCRA/cepo, riesgo país y bonos, y lo más relevante del día.
**PANORAMA GLOBAL** — máx 3 ítems: Fed/tasas, S&P 500/Nasdaq, y lo más relevante del día.
**TUS ACTIVOS** — solo los que tengan novedad real, de esta lista: ${top}. Por cada uno: **TICKER** y luego "- [titular] — por qué te importa".

Reglas CLAVE: cada ítem arranca con lo que pasó en las ÚLTIMAS 24-48 HS (el dato fresco primero). Solo agregá contexto más viejo si es imprescindible para entender, y en ese caso UNA sola frase corta al final del ítem. Nada de relleno histórico. Viñetas con "-"; cada ítem con la FECHA y el medio entre paréntesis cuando puedas. Máx 400 palabras. Información objetiva, sin recomendar comprar/vender.`;
      setNewsOut(await callClaude(p, true, 1600) || "Sin noticias relevantes ahora. Reintentá."); setNewsAt(new Date());
    } catch (e) { setErrN(errMsg(e)); } finally { setLoadingN(false); }
  };
  function fmtAI(s) { return s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>"); }
  function renderInner(blk) {
    const lines = blk.split("\n");

    const items = []; let cur = null;
    lines.forEach(l => { const m = l.match(/^\s*[-•]\s+(.*)$/); if (m) { if (cur != null) items.push(cur); cur = m[1]; } else { const t = l.trim(); if (!t) return; cur = cur == null ? t : cur + " " + t; } });

  return (

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12 }}>
          <div style={{ maxWidth: 560 }}><h3 style={{ fontSize: 16, fontWeight: 600, display: "flex", alignItems: "center", gap: 8 }}><Newspaper size={18} className="gold" />Noticias que mueven tus activos</h3>
            <p className="muted" style={{ fontSize: 12.5, marginTop: 6, lineHeight: 1.55 }}>Búsqueda en vivo de lo último de <strong className="cel">Ámbito, El Cronista</strong> e internacionales (en español): panorama argentino, global y novedades de tus principales tenencias, con fechas.</p></div>
          <button className="btn" onClick={runNews} disabled={loadingN}>{loadingN ? <Loader2 size={15} className="spin" /> : <Newspaper size={15} />}{loadingN ? "Buscando…" : "Traer noticias"}</button>
        </div>
        {errN && <div style={{ color: "var(--loss)", fontSize: 12.5, marginTop: 12 }}><AlertTriangle size={12} /> {errN}</div>}
        {newsOut && <div className="ai-out" style={{ marginTop: 18, paddingTop: 16, borderTop: "1px solid var(--line)" }}>{newsAt && <div className="muted mono" style={{ fontSize: 10.5, marginBottom: 10 }}>Generado {newsAt.toLocaleString("es-AR", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" })} hs</div>}{render(newsOut)}</div>}
      </div>
    </div>
  );
}

      <ShieldCheck size={16} className="cel" style={{ flexShrink: 0, marginTop: 2 }} />
      <p className="muted" style={{ fontSize: 11.5, lineHeight: 1.6, margin: 0 }}>
        Herramienta de seguimiento y soporte a la decisión, de uso personal. No se conecta a tus cuentas de Allaria, Balanz ni Nexo, no guarda credenciales y no opera: vos cargás las posiciones. Los datos quedan en este navegador. El análisis con IA es objetivo y no constituye asesoramiento financiero personalizado. Verificá las cotizaciones en tu broker antes de operar.
      </p>
    </div>
  );
}
